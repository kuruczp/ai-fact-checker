<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Fact Checker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 280px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; background: #fff; color: #1a1a2e; }

    .header { display: flex; align-items: center; gap: 10px; padding: 14px 16px; background: linear-gradient(135deg, #5c6bc0, #3949ab); color: white; }
    .header h1 { font-size: 14px; font-weight: 600; }
    .header p  { font-size: 11px; opacity: .8; margin-top: 1px; }

    .body { padding: 16px; }

    /* Logged out */
    #login-view label { display: block; font-size: 12px; font-weight: 600; color: #555; margin-bottom: 4px; }
    #login-view input { width: 100%; padding: 8px 10px; border: 1.5px solid #e5e7eb; border-radius: 6px; font-size: 13px; outline: none; margin-bottom: 10px; transition: border-color .15s; }
    #login-view input:focus { border-color: #5c6bc0; }
    .btn-login { width: 100%; padding: 9px; background: #5c6bc0; color: white; border: none; border-radius: 7px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-login:hover { background: #3949ab; }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }
    .login-error { color: #c62828; font-size: 12px; margin-top: 6px; display: none; }
    .login-error.show { display: block; }
    .register-link { text-align: center; font-size: 12px; color: #888; margin-top: 10px; }
    .register-link a { color: #5c6bc0; text-decoration: none; cursor: pointer; }

    /* Logged in */
    #logged-view { display: none; }
    .status-pill { display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: 8px; background: #e8f5e9; color: #2e7d32; font-size: 13px; margin-bottom: 12px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4caf50; flex-shrink: 0; }
    .user-email { font-size: 12px; color: #555; margin-bottom: 12px; word-break: break-all; }

    .steps { font-size: 13px; color: #444; line-height: 1.6; margin-bottom: 14px; }
    .steps ol { padding-left: 18px; }
    .steps li { margin-bottom: 5px; }

    .btn-row { display: flex; gap: 8px; }
    .btn-dash { flex: 1; padding: 8px; background: #5c6bc0; color: white; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-dash:hover { background: #3949ab; }
    .btn-out { padding: 8px 12px; background: #f3f4f6; color: #555; border: none; border-radius: 7px; font-size: 12px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-out:hover { background: #e5e7eb; }

    .footer { padding: 10px 16px; border-top: 1px solid #f0f0f0; font-size: 11px; color: #999; text-align: center; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.8"/><path d="M9 12l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
    <div><h1>AI Fact Checker</h1><p>Powered by AI</p></div>
  </div>

  <div class="body">
    <!-- Logged out -->
    <div id="login-view">
      <form id="login-form" style="margin-bottom:0">
        <label for="p-email">Email</label>
        <input type="email" id="p-email" placeholder="you@example.com" autocomplete="email" required />
        <label for="p-pass">Password</label>
        <input type="password" id="p-pass" placeholder="••••••••" autocomplete="current-password" required />
        <button class="btn-login" type="submit" id="p-login-btn">Log in</button>
        <div class="login-error" id="p-error"></div>
      </form>
      <div class="register-link">No account? <a onclick="openDashboard()">Register on the dashboard →</a></div>
    </div>

    <!-- Logged in -->
    <div id="logged-view">
      <div class="status-pill"><div class="status-dot"></div> Ready to fact-check!</div>
      <div class="user-email" id="p-user-email"></div>
      <div class="steps">
        <ol>
          <li><strong>Select</strong> any text on a page</li>
          <li><strong>Right-click</strong> → <strong>"Fact Check with AI"</strong></li>
          <li>Or select a quiz + press <strong>Alt+Shift+F</strong></li>
        </ol>
      </div>
      <div class="btn-row">
        <button class="btn-dash" onclick="openDashboard()">⚙ Dashboard</button>
        <button class="btn-out" onclick="doLogout()">Log out</button>
      </div>
    </div>
  </div>

  <div class="footer">Free for all users · <a href="#" onclick="openDashboard()" style="color:#5c6bc0">Manage keys</a></div>
  <script src="popup.js"></script>
</body>
</html>
